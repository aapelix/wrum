name: autofix.ci
on:
  pull_request:
  push:
permissions:
  contents: read
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - name: Oxlint
        run: bun run lint
      - name: Oxfmt
        run: bun run fmt
      - uses: autofix-ci/action@7a166d7532b277f34e16238930461bf77f9d7ed8
